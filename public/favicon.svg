<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep obsidian -->
    <radialGradient id="bg" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a1028"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <!-- Accent gradient: purple → blue → teal -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle ambient orb -->
    <radialGradient id="orb" cx="70%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.15)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Ambient orb glow -->
  <circle cx="360" cy="130" r="200" fill="url(#orb)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="96" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="2"/>

  <!-- "K" letter with accent gradient and glow -->
  <text
    x="256" y="340"
    font-family="'Sora', 'SF Pro Display', -apple-system, sans-serif"
    font-size="300"
    font-weight="600"
    fill="url(#accent)"
    text-anchor="middle"
    filter="url(#glow)"
  >K</text>

  <!-- Decorative dot accent (like the cursor dot in the blog) -->
  <circle cx="400" cy="130" r="10" fill="#8b5cf6" opacity="0.8"/>
</svg>
